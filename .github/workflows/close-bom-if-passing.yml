name: Close BOM update PR if passing
on:
  check_run:
    types:
      - completed
permissions:
  contents: read
  pull-requests: write
jobs:
  close-bom-if-passing:
    # Only close BOM pull requests on the repo in the jenkinsci GitHub organization
    if: ${{ github.repository_owner == 'jenkinsci' }}
    uses: jenkins-infra/github-reusable-workflows/.github/workflows/close-bom-if-passing.yml@v1
